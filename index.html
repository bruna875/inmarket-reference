<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InMarket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F5F4F0;font-size:13px;-webkit-font-smoothing:antialiased;color:#0D1E36}
:root{--surface:#fff;--bg:#F5F4F0;--border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.12);--text:#0D1E36;--muted:#6B6B65;--faint:#A8A8A0;--subtle:#F4FCF0;--accent:#66C220;--sw:220px;--sc:52px;--tr:.22s cubic-bezier(.4,0,.2,1)}
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;transition:opacity .3s}
#auth.gone{opacity:0;pointer-events:none}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.25rem 2.5rem 2rem;width:350px;box-shadow:0 4px 28px rgba(0,0,0,0.07)}
.alogo{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.amark{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.atitle{font-size:21px;font-weight:500;letter-spacing:-.5px;margin-bottom:5px}
.asub{font-size:12px;color:var(--muted);margin-bottom:1.75rem}
.flabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.fwrap{margin-bottom:13px}
.finput{width:100%;height:40px;border:1px solid var(--border-md);border-radius:8px;padding:0 12px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border .15s,box-shadow .15s}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(102,194,32,.1)}
.finput::placeholder{color:var(--faint)}
.abtn{width:100%;height:40px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:4px;transition:opacity .15s}
.abtn:hover{opacity:.88}
.aerr{font-size:11px;color:#C0392B;min-height:16px;margin-top:7px}
.ahint{font-size:11px;color:var(--faint);margin-top:11px;text-align:center}
#app{display:none;height:100vh}
#app.show{display:flex}
.sbwrap{position:relative;flex-shrink:0}
.sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;transition:width var(--tr);overflow:hidden}
.sb.col{width:var(--sc)}
.sbhead{height:52px;display:flex;align-items:center;padding:0 13px;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.lmark{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lname{font-size:15px;font-weight:500;letter-spacing:-.3px;white-space:nowrap;transition:opacity var(--tr)}
.sb.col .lname{opacity:0}
.sbnav{flex:1;padding:10px 0;overflow-y:auto;overflow-x:hidden}
.sbnav::-webkit-scrollbar{width:3px}
.sbnav::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.seclabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:8px 14px 4px;white-space:nowrap;transition:opacity var(--tr)}
.sb.col .seclabel{opacity:0}
.nitem{display:flex;align-items:center;gap:9px;padding:8px 13px;cursor:pointer;position:relative;white-space:nowrap;transition:background .1s}
.nitem:hover{background:#F4FCF0}
.nitem.act{background:#F4FCF0}
.nitem.act .nlabel{color:var(--accent);font-weight:500}
.nitem.act .nico{color:var(--accent)}
.nbar{position:absolute;left:0;top:5px;bottom:5px;width:2.5px;background:var(--accent);border-radius:0 2px 2px 0}
.nico{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.nlabel{font-size:13px;color:var(--muted);transition:opacity var(--tr)}
.sb.col .nlabel{opacity:0}
.sbfoot{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0}
.avatar{width:28px;height:28px;border-radius:50%;background:#F4FCF0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#66C220;flex-shrink:0}
.uinfo{overflow:hidden;transition:opacity var(--tr)}
.sb.col .uinfo{opacity:0}
.uname{font-size:12px;font-weight:500;white-space:nowrap}
.urole{font-size:11px;color:var(--faint);white-space:nowrap}
.logoutbtn{margin-left:auto;cursor:pointer;color:var(--faint);transition:color .15s;flex-shrink:0}
.logoutbtn:hover{color:var(--accent)}
.togbtn{position:absolute;right:-11px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--surface);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;background:var(--surface);flex-shrink:0;gap:10px}
.breadcrumb{font-size:12px;color:var(--muted)}
.breadcrumb b{color:var(--text);font-weight:500}
.tbadge{font-size:11px;padding:3px 10px;border-radius:20px;background:#F4FCF0;color:var(--accent);margin-left:auto;font-weight:500}
.content{flex:1;padding:28px 32px;overflow-y:auto}
.ptitle{font-size:22px;font-weight:500;letter-spacing:-.5px;margin-bottom:5px}
.psub{font-size:13px;color:var(--muted);margin-bottom:20px}
.tabnav{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;width:fit-content}
.tabitem{height:30px;padding:0 16px;border:none;border-radius:7px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;background:transparent;color:var(--muted);transition:background .15s,color .15s}
.tabitem:hover{color:var(--text)}
.tabitem.act{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tabpanel{display:none}
.tabpanel.act{display:block}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.mlabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:8px}
.mval{font-size:26px;font-weight:500;letter-spacing:-.5px}
.sc-badges{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.sc-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.thead-row{padding:13px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);padding:10px 18px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px 18px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.ds-wrap{position:relative;display:inline-flex;align-items:center;cursor:pointer}
.ds-wrap:hover .ds-pill{opacity:.85}
.ds-pill{pointer-events:none}
.ds-select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.ds-gray{background:#F1EFE8;color:#6B6B65}
.ds-green{background:#EAF3DE;color:#3B6D11}
.ds-yellow{background:#FEF3C7;color:#92700A}
.ds-red{background:#FDECEA;color:#A93226}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.kancol{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.kancol-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.kancol-count{font-size:11px;color:var(--faint);background:var(--bg);border-radius:20px;padding:1px 8px}
.kancol-body{padding:10px;display:flex;flex-direction:column;gap:8px}
.kancard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:11px 12px;display:flex;flex-direction:column;gap:8px}
.kancard-title{font-size:12px;font-weight:500;line-height:1.4;color:var(--text)}
.kancard-tags{font-size:10px;color:var(--faint)}
.kancard-leads{display:flex;gap:10px}
.kancard-lead-item{font-size:11px;color:var(--muted)}
.kancard-lead-label{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.3px}
.kancard-driver{font-size:11px;color:var(--muted)}
.kancard-footer{display:flex;align-items:center;justify-content:space-between}
.init-cell{display:flex;align-items:center;gap:5px}
.init-title{color:inherit;text-decoration:none}
a.init-title:hover{text-decoration:underline;color:var(--accent)}
.link-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;cursor:pointer;color:var(--faint);opacity:0;transition:opacity .15s,color .15s,background .15s;flex-shrink:0;border:none;background:none;padding:0}
tr:hover .link-btn,.link-btn.has-link{opacity:1;color:var(--accent)}
.link-btn:hover{background:var(--subtle)}
.link-popup{position:fixed;background:var(--surface);border:1px solid var(--border-md);border-radius:10px;padding:14px;box-shadow:0 4px 24px rgba(0,0,0,0.12);z-index:999;width:300px;display:none}
.link-popup.show{display:block}
.link-popup-title{font-size:12px;font-weight:500;margin-bottom:10px}
.link-popup-row{display:flex;gap:6px}
.link-popup-row input{flex:1;height:34px;border:1px solid var(--border-md);border-radius:7px;padding:0 10px;font-size:12px;font-family:inherit;outline:none;color:var(--text);min-width:0}
.link-popup-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(102,194,32,.1)}
.link-popup-open{height:34px;width:34px;display:inline-flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border-md);border-radius:7px;cursor:pointer;color:var(--muted);flex-shrink:0;transition:border-color .15s,color .15s}
.link-popup-open:hover{border-color:var(--accent);color:var(--accent)}
.link-popup-open:disabled{opacity:.3;cursor:default;pointer-events:none}
.link-popup-save{height:34px;padding:0 12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0}
.link-popup-save:hover{opacity:.88}
.link-popup-clear{height:34px;padding:0 10px;background:none;border:1px solid var(--border-md);border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--muted);flex-shrink:0}
.link-popup-clear:hover{border-color:var(--accent);color:var(--accent)}
.filterbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filterbar select{height:30px;border:1px solid var(--border-md);border-radius:7px;padding:0 28px 0 10px;font-size:12px;font-family:inherit;color:var(--muted);background:var(--surface);outline:none;cursor:pointer;transition:border .15s;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A8A8A0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
.filterbar select.active{border-color:var(--accent);color:var(--text)}
.filter-reset{height:30px;padding:0 12px;border:1px solid var(--border-md);border-radius:7px;font-size:12px;font-family:inherit;color:var(--muted);background:none;cursor:pointer;transition:color .15s,border-color .15s}
.filter-reset:hover{color:var(--accent);border-color:var(--accent)}
.qfilter{display:flex;gap:4px;margin-bottom:20px}
.qfilter-btn{height:30px;padding:0 14px;border:1px solid var(--border-md);border-radius:7px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s}
.qfilter-btn.act{border-color:var(--accent);background:#F4FCF0;color:var(--accent)}
.ref-layout{display:grid;grid-template-columns:180px 1fr;gap:32px;max-width:100%}
.ref-photo-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.ref-avatar{width:140px;height:140px;border-radius:50%;overflow:hidden;border:2px solid var(--border);background:var(--bg);flex-shrink:0}
.ref-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.ref-avatar-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:600;color:var(--accent);opacity:.35}
.ref-name{font-size:14px;font-weight:500;color:var(--text);text-align:center;line-height:1.3}
.ref-title-small{font-size:11px;color:var(--faint);text-align:center}
.ref-right{display:flex;flex-direction:column;gap:16px}
.ref-quote-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;position:relative}
.ref-quote-mark{font-size:52px;line-height:1;color:var(--accent);opacity:.25;position:absolute;top:8px;left:14px;font-family:Georgia,serif;pointer-events:none;user-select:none}
.ref-quote-text{font-size:13.5px;line-height:1.75;color:var(--text);padding-top:16px;font-style:normal}
.ref-attribution{margin-top:14px;font-size:12px;font-weight:500;color:var(--muted)}
.ref-attribution span{display:block;font-size:11px;color:var(--faint);font-weight:400}
.ref-empty{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 24px;color:var(--faint);font-size:13px}
.wip-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;max-width:560px;margin-bottom:24px}
.wip-eyebrow{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);margin-bottom:8px}
.wip-heading{font-size:18px;font-weight:500;letter-spacing:-.3px;margin-bottom:10px}
.wip-body{font-size:13px;color:var(--muted);line-height:1.65}
.res-card-desc{font-size:13px;color:var(--muted);line-height:1.65}
/* wizard */
.wiz-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.wiz-item.wiz-active{border-color:var(--accent)}
.wiz-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
.wiz-num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--faint);flex-shrink:0;transition:all .2s}
.wiz-item.wiz-done .wiz-num{background:#EAF3DE;border-color:#3B6D11}
.wiz-item.wiz-active .wiz-num{background:var(--accent);border-color:var(--accent);color:#fff}
.wiz-header-text{flex:1;min-width:0}
.wiz-eyebrow{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:2px}
.wiz-item.wiz-active .wiz-eyebrow{color:var(--accent)}
.wiz-title{font-size:14px;font-weight:500;color:var(--text)}
.wiz-chevron{color:var(--faint);transition:transform .2s;flex-shrink:0}
.wiz-item.wiz-active .wiz-chevron{transform:rotate(180deg);color:var(--accent)}
.wiz-body{display:none;padding:0 20px 20px}
.wiz-item.wiz-active .wiz-body{display:block}
.wiz-nav{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:18px}
.wiz-btn{height:34px;padding:0 16px;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s}
.wiz-btn-next{background:var(--accent);color:#fff;border:none}
.wiz-btn-next:hover{opacity:.88}
.wiz-btn-back{background:none;border:1px solid var(--border-md);color:var(--muted)}
.wiz-btn-back:hover{border-color:var(--accent);color:var(--accent)}
.wiz-done-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#3B6D11;font-weight:500}
/* signature */
.sig-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-top:4px}
.sig-box-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);margin-bottom:14px}
.sig-idle{display:flex;align-items:center;gap:12px}
.sig-btn{height:36px;padding:0 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s}
.sig-btn:hover{opacity:.88}
.sig-btn:disabled{opacity:.5;cursor:default}
.sig-btn-sec{height:36px;padding:0 14px;background:none;border:1px solid var(--border-md);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--muted);transition:border-color .15s,color .15s}
.sig-btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.sig-hint{font-size:12px;color:var(--faint)}
.sig-code-wrap{margin-top:10px}
.sig-code-lbl{font-size:12px;color:var(--muted);margin-bottom:8px}
.sig-code-row{display:flex;gap:8px;align-items:center}
.sig-code-input{height:38px;width:130px;border:1px solid var(--border-md);border-radius:8px;padding:0 14px;font-size:16px;font-weight:500;letter-spacing:4px;font-family:inherit;color:var(--text);outline:none;text-transform:uppercase;transition:border .15s,box-shadow .15s}
.sig-code-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(102,194,32,.1)}
.sig-err{font-size:11px;color:#C0392B;margin-top:6px}
.sig-done{display:flex;align-items:center;gap:10px}
.sig-done-check{width:28px;height:28px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sig-done-text{font-size:13px;color:var(--text)}
.sig-done-name{font-family:'Segoe Script','Brush Script MT',cursive;font-size:22px;color:var(--text);margin-left:4px}
</style>
</head>
<body>
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="amark"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 4.5L8.5 6L5.5 9L8.5 12L7 13.5L3 9Z" fill="white"/><path d="M9 9L13 4.5L14.5 6L11.5 9L14.5 12L13 13.5L9 9Z" fill="white" opacity=".45"/></svg></div>
      <span style="font-size:18px;font-weight:500;letter-spacing:-.3px">InMarket</span>
    </div>
    <div class="atitle">Sign in</div>
    <div class="asub">Enter your credentials to continue</div>
    <div class="fwrap"><div class="flabel">Email</div><input class="finput" id="em" type="text" value="poorhumans@inmarket.com" placeholder="you@company.com"/></div>
    <div class="fwrap"><div class="flabel">Password</div><input class="finput" id="pw" type="password" placeholder="••••••••"/></div>
    <div class="aerr" id="err"></div>
    <button class="abtn" id="loginBtn">Sign in</button>
    <div class="ahint">Demo: poorhumans@inmarket.com / babbazzi2026</div>
  </div>
</div>
<div id="app">
  <div class="sbwrap">
    <div class="sb" id="sb">
      <div class="sbhead">
        <div class="lmark"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 3.5L6.8 4.8L4 7L6.8 9.2L5.5 10.5L2 7Z" fill="white"/><path d="M7.2 7L10.7 3.5L12 4.8L9.2 7L12 9.2L10.7 10.5L7.2 7Z" fill="white" opacity=".45"/></svg></div>
        <span class="lname">InMarket</span>
      </div>
      <nav class="sbnav" id="nav"></nav>
      <div class="sbfoot">
        <div class="avatar" id="av">AD</div>
        <div class="uinfo"><div class="uname" id="un">Admin</div><div class="urole">Product Manager</div></div>
        <div class="logoutbtn" id="logoutBtn" title="Sign out"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div>

  </div>

<script>
(function() {

// ── EmailJS ───────────────────────────────────────────────────────────────────
var EJS_SVC    = 'service_7ix3z7i';
var EJS_TPL    = 'template_mzc2pqe';
var EJS_KEY    = 'uKxnVxIdCvTn9wl3j';
var SIG_NOTIFY = 'bruna@saykudos.co';

function ejsSend(toEmail, code, name, page) {
  return fetch('https://api.emailjs.com/api/v1.0/email/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      service_id: EJS_SVC, template_id: EJS_TPL, user_id: EJS_KEY,
      template_params: {email: toEmail, passcode: code, name: name, page: page}
    })
  });
}

// ── Signature ─────────────────────────────────────────────────────────────────
var _sigCodes = {};
var _sigDone  = {};

function loadSavedSignatures() {
  return fetch('/api/signatures')
    .then(function(r) { return r.json(); })
    .then(function(data) { _sigDone = data || {}; })
    .catch(function() { _sigDone = {}; });
}

function saveSig(pageId, name) {
  _sigDone[pageId] = {name: name};
  fetch('/api/signatures', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(_sigDone)
  }).catch(function(e) { console.warn('sig save failed', e); });
}

function sigGenCode() {
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', o = '';
  for (var i = 0; i < 6; i++) o += c[Math.floor(Math.random() * c.length)];
  return o;
}

function sigBoxHtml(pageId, pageLabel, toEmail) {
  var done = _sigDone[pageId];
  if (done) {
    return '<div class="sig-box"><div class="sig-box-title">Signature</div>'
      + '<div class="sig-done">'
      + '<div class="sig-done-check"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
      + '<div class="sig-done-text">Signed by<span class="sig-done-name"> ' + done.name + '</span></div>'
      + '</div></div>';
  }
  var pending = _sigCodes[pageId] && _sigCodes[pageId].expires > Date.now();
  if (pending) {
    return '<div class="sig-box"><div class="sig-box-title">Signature</div>'
      + '<div class="sig-code-wrap">'
      + '<div class="sig-code-lbl">A code was sent to <strong>' + toEmail + '</strong>. Enter it below:</div>'
      + '<div class="sig-code-row">'
      + '<input class="sig-code-input" id="sig-inp-' + pageId + '" maxlength="6" placeholder="XXXXXX" autocomplete="off"/>'
      + '<button class="sig-btn" data-sv="' + pageId + '" data-sl="' + encodeURIComponent(pageLabel) + '" data-se="' + toEmail + '">Verify</button>'
      + '<button class="sig-btn-sec" data-sr="' + pageId + '" data-sl="' + encodeURIComponent(pageLabel) + '" data-se="' + toEmail + '">Resend</button>'
      + '</div><div class="sig-err" id="sig-err-' + pageId + '"></div>'
      + '</div></div>';
  }
  return '<div class="sig-box"><div class="sig-box-title">Signature</div>'
    + '<div class="sig-idle">'
    + '<button class="sig-btn" data-sq="' + pageId + '" data-sl="' + encodeURIComponent(pageLabel) + '" data-se="' + toEmail + '">Sign this page</button>'
    + '<span class="sig-hint">A code will be sent to ' + toEmail + '</span>'
    + '</div></div>';
}

function sigRefresh(pageId, pageLabel, toEmail) {
  var el = document.getElementById('sig-wrap-' + pageId);
  if (el) el.innerHTML = sigBoxHtml(pageId, pageLabel, toEmail);
}

function sigRequest(pageId, pageLabel, toEmail) {
  var code = sigGenCode();
  var signerName = pageLabel;
  var h = document.querySelector('.ptitle');
  if (h && h.textContent && !PAGES[pageId]) signerName = h.textContent.trim();
  _sigCodes[pageId] = {code: code, expires: Date.now() + 10 * 60 * 1000, signerName: signerName};
  var btn = document.querySelector('[data-sq="' + pageId + '"]');
  if (btn) { btn.textContent = 'Sending\u2026'; btn.disabled = true; }
  ejsSend(toEmail, code, signerName, pageLabel)
    .then(function() { sigRefresh(pageId, pageLabel, toEmail); })
    .catch(function(e) { console.error(e); sigRefresh(pageId, pageLabel, toEmail); });
}

function sigVerify(pageId, pageLabel, toEmail) {
  var inp = document.getElementById('sig-inp-' + pageId);
  var err = document.getElementById('sig-err-' + pageId);
  if (!inp) return;
  var val = inp.value.trim().toUpperCase();
  var stored = _sigCodes[pageId];
  if (!stored || stored.expires < Date.now()) {
    if (err) err.textContent = 'Code expired \u2014 please request a new one.';
    return;
  }
  if (val !== stored.code) {
    if (err) err.textContent = 'Incorrect code. Try again.';
    inp.style.borderColor = '#C0392B';
    return;
  }
  var rawName = stored.signerName || toEmail.split('@')[0];
  var displayName = rawName.split(' ').map(function(w) {
    return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  }).join(' ');
  delete _sigCodes[pageId];
  saveSig(pageId, displayName);
  sigRefresh(pageId, pageLabel, toEmail);
  ejsSend(SIG_NOTIFY, '\u2713 SIGNED', displayName + ' (' + toEmail + ') signed \u201c' + pageLabel + '\u201d', pageLabel)
    .catch(function(e) { console.warn(e); });
}

  {label:'The Theory', title:'You don\u2019t notice until it\u2019s too late', desc:'A frog placed in boiling water jumps out immediately. A frog placed in cold water that slowly heats up doesn\u2019t notice the change \u2014 and eventually boils. The threat was never sudden. It was gradual, normalized, and invisible until it wasn\u2019t.', svg:'<svg viewBox="0 0 340 160" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;display:block;margin:0 0 16px"><ellipse cx="170" cy="130" rx="80" ry="14" fill="#D0CEC8" opacity=".4"/><path d="M100 80 Q100 140 170 140 Q240 140 240 80 Z" fill="#E8E6E0"/><path d="M95 80 Q95 145 170 145 Q245 145 245 80" stroke="#A8A8A0" stroke-width="2" fill="none"/><rect x="85" y="72" width="170" height="14" rx="7" fill="#C8C6C0"/><rect x="78" y="72" width="14" height="28" rx="7" fill="#A8A8A0"/><rect x="248" y="72" width="14" height="28" rx="7" fill="#A8A8A0"/><path d="M100 86 Q135 92 170 88 Q205 84 240 86 L240 80 Q205 78 170 78 Q135 78 100 80 Z" fill="#B8D4F0" opacity=".5"/><circle cx="140" cy="110" r="4" fill="none" stroke="#A8A8A0" stroke-width="1.2" opacity=".5"/><circle cx="170" cy="100" r="3" fill="none" stroke="#A8A8A0" stroke-width="1.2" opacity=".4"/><circle cx="200" cy="112" r="5" fill="none" stroke="#A8A8A0" stroke-width="1.2" opacity=".5"/><ellipse cx="170" cy="108" rx="22" ry="16" fill="#8BAF6A" opacity=".75"/><ellipse cx="170" cy="104" rx="18" ry="12" fill="#9DC47A" opacity=".8"/><circle cx="162" cy="96" r="5" fill="#6B8A50"/><circle cx="178" cy="96" r="5" fill="#6B8A50"/><circle cx="162" cy="96" r="3" fill="#fff" opacity=".9"/><circle cx="178" cy="96" r="3" fill="#fff" opacity=".9"/><circle cx="163" cy="96" r="1.5" fill="#2A3A1A"/><circle cx="179" cy="96" r="1.5" fill="#2A3A1A"/><path d="M164 106 Q170 110 176 106" stroke="#5A7A40" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M150 118 Q140 128 132 124 Q138 120 148 122" fill="#8BAF6A" opacity=".7"/><path d="M190 118 Q200 128 208 124 Q202 120 192   {label:'In Organizations', title:'Culture doesn\u2019t rot overnight', desc:'No single incident poisoned the culture. It happened one accepted exception at a time. Someone raised their voice in a meeting \u2014 and nothing was said. A deadline was missed with no consequence. Credit was taken publicly, blame assigned privately. Each event quietly reset the baseline of what was tolerable. Over time, the organization stopped calling things by their name. Dysfunction became \u201cour style.\u201d Disrespect became \u201cdirectness.\u201d Impunity became \u201csenior privilege.\u201d The water was warm and everyone had already adjusted.', svg:'<svg viewBox="0 0 340 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;display:block;margin:0 0 16px"><rect x="20" y="10" width="70" height="90" rx="4" fill="#fff" stroke="#D0CEC8" stroke-width="1.5"/><rect x="20" y="10" width="70" height="16" rx="4" fill="#E8E6E0"/><text x="55" y="22" font-size="7.5" fill="#A8A8A0" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="500">OUR VALUES</text><line x1="30" y1="38" x2="80" y2="38" stroke="#E8E6E0" stroke-width="1.5" stroke-linecap="round"/><line x1="30" y1="50" x2="75" y2="50" stroke="#E8E6E0" stroke-width="1.5" stroke-linecap="round"/><line x1="30" y1="62" x2="78" y2="62" stroke="#E8E6E0" stroke-width="1.5" stroke-linecap="round"/><line x1="30" y1="74" x2="70" y2="74" stroke="#E8E6E0" stroke-width="1.5" stroke-linecap="round"/><circle cx="55" cy="10" r="4" fill="#A8A8A0" opacity=".5"/><circle cx="140" cy="38" r="10" fill="#C8C6C0"/><path d="M128 70 Q130 55 140 52 Q150 55 152 70 L148 70 Q147 60 140 58 Q133 60 132 70 Z" fill="#C8C6C0"/><circle cx="200" cy="38" r="10" fill="#B0AEA8"/><path d="M188 70 Q190 55 200 52 Q210 55 212 70 L208 70 Q207 60 200 58 Q193 60 192 70 Z" fill="#B0AEA8"/><path d="M188 58 Q182 54 180 50" stroke="#B0AEA8" stroke-width="3" stroke-linecap="round"/><path d="M212 58 Q218 54 220 50" stroke="#B0AEA8" stroke-width="3" stroke-linecap="round"/><circle cx="260" cy="38" r="10" fill="#9A9890"/><path d="M248 70 Q250 55 260 52 Q270 55 272 70 L268 70 Q267 60 260 58 Q253 60 252 70 Z" fill="#9A9890"/><rect x="255" y="46" width="10" height="14" rx="2" fill="#6B6B65" opacity=".4"/><path d="M148 28 Q158 18 170 20 Q182 18 182 28 Q182 36 170 36 Q162 37 158 40 L160 34 Q148 34 148 28 Z" fill="#F5F4F0" stroke="#D0CEC8" stroke-width="1"/><text x="165" y="30" font-size="6" fill="#A8A8A0" text-anchor="middle" font-family="DM Sans,sans-serif">not that bad</text><rect x="305" y="20" width="12" height="100" rx="6" fill="#F5F4F0" stroke="#D0CEC8" stroke-width="1.2"/><rect x="307" y="50" width="8" height="68" rx="4" fill="#66C220" opacity=".3"/><circle cx="311" cy="122" r="8" fill="#66C220" opacity=".35"/><line x1="10" y1="110" x2="295" y2="110" stroke="#E8E6E0" stroke-width="1.5"/></svg>'},
  {label:'The Warning Signs', title:'Listen for the language of adaptation', desc:'The clearest signal is when people stop naming things. Nobody calls it a toxic dynamic anymore \u2014 it just becomes \u201cthe way things work here.\u201d Watch for: \u201cwe\u2019ve always done it this way,\u201d \u201cit\u2019s not that bad,\u201d \u201cthat\u2019s just how he is,\u201d or \u201cwe\u2019ll deal with it later.\u201d These are not descriptions of reality. They are evidence that the frog has stopped feeling the heat \u2014 and started defending the temperature.', svg:'<svg viewBox="0 0 340 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;display:block;margin:0 0 16px"><path d="M38 50 Q20 50 20 75 Q20 100 38 100 Q50 100 52 90 Q44 88 42 75 Q44 62 52 60 Z" fill="#C8C6C0" opacity=".6"/><path d="M38 58 Q28 58 28 75 Q28 92 38 92 Q44 92 46 84 Q40 82 39 75 Q40 68 46 66 Z" fill="#B0AEA8" opacity=".5"/><rect x="65" y="12" width="118" height="26" rx="8" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><path d="M76 38 L70 46 L82 38" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><text x="124" y="28" font-size="8" fill="#6B6B65" text-anchor="middle" font-family="DM Sans,sans-serif">\u201cthat\u2019s just how he is\u201d</text><rect x="190" y="48" width="130" height="26" rx="8" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><path d="M200 74 L195 82 L207 74" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><text x="255" y="64" font-size="8" fill="#6B6B65" text-anchor="middle" font-family="DM Sans,sans-serif">\u201cwe\u2019ve always done it this way\u201d</text><rect x="58" y="78" width="104" height="26" rx="8" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><path d="M68 104 L62 112 L74 104" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><text x="110" y="94" font-size="8" fill="#6B6B65" text-anchor="middle" font-family="DM Sans,sans-serif">\u201cit\u2019s not that bad\u201d</text><rect x="175" y="112" width="108" height="26" rx="8" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><path d="M185 112 L180 104 L192 112" fill="#F5F4F0" stroke="#A8A8A0" stroke-width="1.2"/><text x="229" y="128" font-size="8" fill="#6B6B65" text-anchor="middle" font-family="DM Sans,sans-serif">\u201cwe\u2019ll deal with it later\u201d</text></svg>'},
  {label:'The Antidote', title:'Bring in cold water, deliberately', desc:'The only reliable way to feel the temperature again is to introduce a perspective that has not adapted to it. Ask what a new hire would find alarming in their first week. Create regular moments where the question is not \u201chow do we improve\u201d but \u201cwhat have we learned to tolerate that we should not.\u201d The goal is not to create panic. It is to recover the ability to name things \u2014 and by naming them, reclaim the choice of whether to accept them.', svg:'<svg viewBox="0 0 340 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;display:block;margin:0 0 16px"><circle cx="60" cy="55" r="11" fill="#B0AEA8"/><path d="M47 90 Q50 72 60 70 Q70 72 73 90 L69 90 Q68 76 60 74 Q52 76 51 90 Z" fill="#B0AEA8"/><path d="M50 78 Q45 85 44 90" stroke="#B0AEA8" stroke-width="2.5" stroke-linecap="round"/><path d="M70 78 Q75 85 76 90" stroke="#B0AEA8" stroke-width="2.5" stroke-linecap="round"/><circle cx="115" cy="58" r="11" fill="#B0AEA8"/><path d="M102 90 Q105 74 115 72 Q125 74 128 90 L124 90 Q123 78 115 76 Q107 78 106 90 Z" fill="#B0AEA8"/><text x="122" y="48" font-size="9" fill="#A8A8A0" font-family="DM Sans,sans-serif" opacity=".7">z</text><text x="130" y="40" font-size="11" fill="#A8A8A0" font-family="DM Sans,sans-serif" opacity=".5">z</text><line x1="170" y1="20" x2="170" y2="130" stroke="#E8E6E0" stroke-width="1.5" stroke-dasharray="5 4"/><circle cx="230" cy="52" r="11" fill="#8BAF6A" opacity=".8"/><path d="M217 90 Q220 70 230 68 Q240 70 243 90 L239 90 Q238 74 230 72 Q222 74 221 90 Z" fill="#8BAF6A" opacity=".8"/><circle cx="227" cy="50" r="2" fill="#fff"/><circle cx="233" cy="50" r="2" fill="#fff"/><circle cx="227.8" cy="50.5" r="1" fill="#2A3A1A"/><circle cx="233.8" cy="50.5" r="1" fill="#2A3A1A"/><text x="248" y="38" font-size="22" fill="#66C220" font-family="DM Sans,sans-serif" font-weight="300" opacity=".7">?</text><circle cx="218" cy="78" r="8" fill="none" stroke="#66C220" stroke-width="2" opacity=".6"/><line x1="224" y1="84" x2="230" y2="90" stroke="#66C220" stroke-width="2" stroke-linecap="round" opacity=".6"/><text x="87" y="112" font-size="8" fill="#A8A8A0" text-anchor="middle" font-family="DM Sans,sans-serif">adapted</text><text x="255" y="112" font-size="8" fill="#66C220" text-anchor="middle" font-family="DM Sans,sans-serif">fresh eyes</text></svg>'}

function wizHtml(wizId, items) {
  var cur = _wizState[wizId] !== undefined ? _wizState[wizId] : 0;

    var numHtml = done
      ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : String(i + 1);
    var bodyHtml = '';

      var navHtml = '<div class="wiz-nav">';
      if (i > 0) navHtml += '<button class="wiz-btn wiz-btn-back" data-wiz="' + wizId + '" data-wiz-dir="-1">\u2190 Back</button>';

        navHtml += '<button class="wiz-btn wiz-btn-next" data-wiz="' + wizId + '" data-wiz-dir="1">Next \u2192</button>';
      } else {
        navHtml += '<span class="wiz-done-badge"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> All done</span>';
      }
      navHtml += '</div>';
      bodyHtml = '<div class="wiz-body">'
        + (item.svg || '')
        + '<div class="res-card-desc">' + item.desc + '</div>'
        + navHtml
        + '</div>';
    }
    html += '<div class="' + cls + '" data-wiz-toggle="' + wizId + '" data-wiz-idx="' + i + '">'
      + '<div class="wiz-header">'
      + '<div class="wiz-num">' + numHtml + '</div>'
      + '<div class="wiz-header-text">'
      + '<div class="wiz-eyebrow">' + item.label + '</div>'

      + '</div>'
      + bodyHtml
      + '</div>';
  }
  html += '</div>';
  return html;
}

function wizSetIndex(wizId, idx, items) {

}

var REFERENCES = [
  {id:'deniece_kennedy',    name:'Deniece', fullName:'Deniece Kennedy',        title:'Chief Corporate Officer',        photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775716434/DK_V2_2x_xqjwbh.jpg',        icon:ico.deniece, quote:'<strong>Strategic Vision and Corporate Integrity</strong><br><br>While many leaders claim to have a 10,000-foot view of the Company, Bruna operates at a 20,000-foot level. Her ability to visualize, shape, and act upon complex systems is something I have never seen before. She seamlessly bridges the gap between deep product knowledge, corporate finance fundamentals, strategy and technology. Beyond her competence, her integrity is beyond reproach; throughout a four-year international engagement involving tax optimization paperwork and private vehicles, she practiced radical transparency, disclosing even private and irrelevant details to ensure full compliance (indeed, we didn\u2019t pay much attention to those details, and know we say we can\u2019t recall she disclosed them timely).<br>Furthermore, her dedication was evident in her total flexibility, shifting her life habits for four years to accommodate US time zones, connecting with the people she was coordinating, and prioritizing substantial work rather than aged industrial-revolution principle.<br>We have two things in common: first, we never compromise the objectivity of our Reports to the Company governance; second, we both have a good knowledge of Capital Markets (i.e. Family Offices from Philippines, VC, Venture Debt, etc). I recommend her to any company looking to scale; she is far too senior for small startups, and deserves a platform that matches her experience. I know she was holding me in very high regard, which I did my best to never disappoint \u2014 this is why I am the first in the reference list, in case you are wondering.'},
  {id:'arthur_haedike',     name:'Arthur',  fullName:'Arthur Haedike',         title:'Chief Technology Officer',       photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742004/Art-Haedike_2x-1_kvlzqb.jpg', icon:ico.arthur,  quote:'<strong>Technical Leadership and Product Culture</strong><br><br>Bruna is the most senior Product partner I have worked with at the Company (she didn\u2019t have strong competitors, to be honest). Her strong Product Vision allowed us to kaizen our organization to better align with the products we aimed to build, benchmarking against literature masterpieces like DDD or Conway\u2019s Law. In fact, she had shared this vision with me even before joining (12/26/2021), though it took us time to get there; as we love to say, <em>\u201cwe took decisions with the information we had at the time, then we had new information and we took more decisions\u201d</em> \u2014 likely because, at that time, the person heading Product was not a \u2018Product person\u2019, but more like an unprofessional spoiled brat kid; also, we didn\u2019t know yet <em>\u201cwho Bruna is\u201d</em>.<br>My recently-promoted, high-IQ engineers never had to \u2018mansplain\u2019 a single thing to her, especially on topics they themselves struggle with, like leadership, UX, or ROI calculation. We tested the software she produced multiple times, very obsessively \u2014 to the point that we looked ridiculous; unable to find the real bugs we were told about, someone eventually tried fabricating them, but she caught him every single time (though she waited until she left the company to call us out on it).<br>Hire her if you want to evolve a non-mature Product Culture and implement roadmapping techniques that masterfully merge Product Strategy, Financial Principles, and Development capacity into <em>\u2018vibe-coded\u2019</em> dashboards.<br>Beyond the work, I truly enjoyed the cultural exchange: she taught me how a <em>\u201cjoke\u201d</em> (or a provocation) about the Mafia to a Sicilian is as poorly received as a joke about guns in schools to an American. I even walked away learning some idiomatic Italian like <em>\u201cconosco i miei polli\u201d</em> and how concepts like uncertainty, ambiguity, maneuvering, information asymmetry, haziness, and randomness may be same same, but different. I love when she calls me Arturo.'},
  {id:'teresa_thomas',      name:'Teresa',  fullName:'Teresa Thomas',          title:'VP, People Operations',          photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742501/teresa_wkvzvd.jpg',           icon:ico.teresa,  quote:'<strong>Emotional Intelligence and Organizational Design</strong><br><br>Bruna is a superstar leader who leads through influence rather than just the bare minimum formal power needed to get things done without feeling like moving the mountains. Her high Emotional Intelligence allows her to identify the root causes of organizational friction \u2014 be it resentment, insecurity, status, fear, shame, envy, control, ego or malignant narcissism disturb with all its patterns \u2014 guide people through their darker impulses to risky but necessary individual initiatives, and enabling fearless teams to do the right thing. Her <em>\u2018Condominium for Dummies\u2019</em> workshop was a masterclass in organizational design, despite the fact that she is very modest and labels the content she brought as <em>\u201cpatently obvious\u201d</em>.<br>She is a pillar of resilience in conflict management \u2014 staying calm for months in front of the meanest manipulatory tactics \u2014 and a fierce advocate for workplace compliance and anti-harassment policies.<br>On a personal level, we talked a lot about the profound value of humility over condescension, and I look forward to visiting her in Italy. She promised to bring me to some non-touristic neighborhoods with personality, where people give accelerated, interactive, and unconventional classes of dignity and non-judgemental respect, and I\u2019m so curious. On a summer evening, we can also go to a fancy mafia-owned place close to the Bocconi University, to deep dive into the cultural universe behind wine-making, and having a couple of overpriced glasses with her family (I will make sure we will not invite the people who always get drunk at the retreat or they will embarrass us!).<br>She gave me her phone number (+39 349 82 18 547) so I can give her a call when I travel to Italy. She told me to keep it protected from stalkers: what a funny girl!'},
  {id:'michael_della_penna',name:'Michael', fullName:'Michael Della Penna',    title:'Chief Strategy Officer',         photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742005/MDP_2x-1_ghbjv2.jpg',         icon:ico.michael, quote:'<strong>Ambition and Collaborative Drive</strong><br><br>Having worked with Bruna at a previous firm before bringing her to InMarket, I can\u2019t be anything else than consistent and coherent with myself in attesting her drive and ambition. She is a fierce competitor who remains strictly team-oriented and collaborative. My entire Product Marketing team viewed her as a vital peacemaker who always tried to resolve cross-departmental, not always common-sense rooted, conflicts.<br>On a personal side, I\u2019ll admit, I am very jealous of her being in Italy. I travel there every year for 3 or 4 weeks to enjoy the Dolce Vita (even if I suspect that lifestyle is just something they stereotypically sell to us Americans to keep us organizing expensive wedding parties there). We have remained in close contact on LinkedIn since her resignation, where I regularly message her (with some involuntary typos) about how <em>\u201cMilian\u201d must be crazy</em>, basically <em>\u201cevery Industry Events\u201d</em>, ask for news regarding our common friend <em>\u201cAntonio\u201d</em>, and talk about <em>\u201cinevitability\u201d</em> of things in life. Sometimes I can come through as <em>\u201cintimidating\u201d</em>, but it\u2019s just small talk. lol.'},
  {id:'stanley_turek',      name:'Stanley', fullName:'Stanley Turek',          title:'Measurement Business',           photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742005/Stan-Turek_2x_fboi0h.jpg',    icon:ico.stanley, quote:'<strong>Resilience and Execution</strong><br><br>Bruna has been the driving force behind the Measurement team\u2019s successes over the last four years, including the delivery of LCI suites and the Cross-Channel integration. She has a <em>\u2018magical\u2019</em> ability to resolve conflicts before I \u2014 and the leadership \u2014 even notice they exist, and that\u2019s really impressive, since often conflicts originate where I am. How is it possible I didn\u2019t notice there was a conflict until when I have been told, if I was the origin of the conflict? True magic.<br>When faced with external delays \u2014 for example the 6 quarters delay for the 2 weeks work needed for the Measurement Integration in Platform I had to postpone because of conflicts with my personal priorities \u2014 her resilience never wavered. I keep it short: facts speak loud for both of us, and I am a very substantial person who hates fluff (AI-generated or not).'},
  {id:'tonya_may',          name:'Tonya',   fullName:'Tonya May',              title:'Chief Customer Success Officer', photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742006/Tonya-Konstantin_2x-1_k5ttfy.jpg', icon:ico.tonya, quote:'<strong>Interdepartmental Synergy and Senior Management Mentorship</strong><br><br>Bruna worked extensively with the Customer Success teams, fostering excellent relationships across the board. Her presence was felt through her support of our client-facing teams. It seems that Bruna and I actually have something in common, although I think things might have gone a bit smoother for me \u2014 perhaps simply because I was perceived as less of a threat to certain people than she was, and I was not untransparently and judgmentally <em>\u201ctested\u201d</em> to confirm \u2014 or not \u2014 if long-lasting smear campaigns were based on real facts or just on the narcissistic wound someone had experienced because she was outrageously working with her manager. However, I know she honored the mandate she was given for several months beyond the very end, building upon the legacy of my mentor.'},
  {id:'trina_rizzo',        name:'Trina',   fullName:'Trina Rizzo',            title:'Chief Revenue Officer',          photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742007/Trina-Rizzo_2x_vwleqm.jpg',    icon:ico.trina,   quote:'<strong>Just don\u2019t Take their Word for it</strong><br><br>The organizational structures limited our direct daily interaction and her direct contribution to my team work, so I can\u2019t comment a lot, and \u2014 following the example of certain recently-promoted high-IQ engineers \u2014 I don\u2019t usually talk about things I don\u2019t know. However, the objective facts of her contributions, backed by the high praise of my most trusted colleagues (which I always follow blindly), speak volumes about her standing. Even when they were self-contradictory \u2014 like labeling her as <em>\u201clazy\u201d</em>, and after a few minutes complaining about her doing two jobs \u2014 they resonated, somehow.'},
  {id:'jason_knapp',        name:'Jason',   fullName:'Jason Knapp',            title:'Chief Legal and Privacy Officer', photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742004/Jason-Knapp_2x-1_tua2kt.jpg',  icon:ico.jason,   quote:'<strong>Legal Acumen and Global Compliance</strong><br><br>For one year, and also post-resignation, Bruna and I shared many deep exchanges regarding topics I, as a Chief Legal and Privacy Officer, really care about: Compliance, Privacy, Accountability, and Justice. Bruna possesses a sophisticated understanding of European and international law, specifically Privacy Regulations. Our discussions on how instability-driven illicit data processing, and panopticon-alike monitoring, intersect in Italy with Codice Penale \u2014 such as <em>diffamazione (595 c.p.)</em>, <em>cyberstalking</em>, <em>atti persecutori e stalking professionale (612-bis c.p.)</em> (characterized by the social isolation of the victim, reputational attacks, obsessive control, and marginalization), but also <em>sostituzione di persona (494 c.p.)</em>, <em>frode informatica</em>, <em>accesso abusivo a sistemi informatici (615-ter c.p.)</em> e <em>induzione al reato (414 c.p.)</em> \u2014 were incredibly insightful. In exchange, I trained her about discrimination and harassment in the workplace, hostile working environment, constructive discharge, tortious interference, intentional infliction of emotional distress, and retaliation in the US system. We agreed on each single comma.<br>Her intellectual curiosity for regulations, norms and laws is something I rarely found in Product Leaders: she said she learnt by real life experience. I love practicing my Italian skills with her, and I have been told she is also good at coordinating with public officers at Institutions like the Consulate, the Civil Registry and multiple Local Municipalities, on behalf of mentally disturbed people who later manipulated her willingness to help, to get complex issues sorted out. She definitely knows how to navigate regulations to solve wicked and demoniac problems. She said she appreciated my dignity, at the end.'},
  {id:'todd_morris',        name:'Todd',    fullName:'Todd Morris',            title:'CEO',                            photo:'https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775742006/Todd-Morris_2x-1_ihwygy.jpg',   icon:ico.todd,    quote:'<strong>Final Executive Endorsement</strong><br><br>Bruna is a well-rounded Senior Executive Product Leader whose professionalism spans from entrepreneurship to systems thinking and creative problem-solving. Her background gives her a unique perspective on governance, and she consistently prioritizes the <em>\u2018greater good\u2019</em> with rare courage, discipline, consistency, adamantine tenacity and tireless energy. What struck me the most is her ability to predict the future to the point that she seems crazy until the future happens, and you acknowledge she was right.<br>She doesn\u2019t speak out often, but when she does, you notice it: when she sounds the alarm on a serious problem / upcoming disaster, that you may be underestimating, or minimizing for toxic optimism or simple psychological self-defense, it is better to trust her.<br>The only problem is when she pulls out the mirror and puts it in front of people: it seems teams prefer her when she remains silent. I forgot to mention: she is also a great designer.'}
];

function currentQ(){var m=new Date().getMonth();return 'Q'+(m<3?1:m<6?2:m<9?3:4);}
function currentQLabel(){var m=new Date().getMonth(),y=new Date().getFullYear();return 'Q'+(m<3?1:m<6?2:m<9?3:4)+' '+y;}
function fmtDollar(v){if(!v||v==='\u2014')return '\u2014';var n=parseFloat(String(v).replace(/[^0-9.-]/g,''));if(isNaN(n))return String(v);return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function roiHtml(v){if(!v||v==='\u2014')return '\u2014';var n=parseFloat(String(v).replace(/[^0-9.-]/g,''));if(isNaN(n))return String(v);var p=Math.round(n*100);return '<span style="color:'+(p<0?'#E24B4A':'#3B6D11')+';font-weight:500">'+p+'%</span>';}
function dsHtml(idx){var cur=initiatives[idx].deliveryStatus,opt=deliveryOpts.filter(function(o){return o.val===cur;})[0]||deliveryOpts[0];return '<div class="ds-wrap" data-idx="'+idx+'" style="cursor:pointer"><span class="pill ds-pill '+opt.cls+'" id="ds-pill-'+idx+'">'+opt.label+'</span></div>';}
function linkIconHtml(idx){var i=initiatives[idx],cls='link-btn'+(i.link?' has-link':'');return '<button class="'+cls+'" data-link-idx="'+idx+'" title="'+(i.link?'Edit link':'Add link')+'"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6.5 9.5a4 4 0 005.66 0l2-2a4 4 0 00-5.66-5.66L7.44 2.94" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9.5 6.5a4 4 0 00-5.66 0l-2 2a4 4 0 005.66 5.66l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>';}
function titleCellHtml(idx){var i=initiatives[idx],t=i.link?'<a href="'+i.link+'" target="_blank" class="init-title">'+i.title+'</a>':'<span class="init-title">'+i.title+'</span>';return '<div class="init-cell">'+t+linkIconHtml(idx)+'</div>';}
function saveLocalState(){var s={};initiatives.forEach(function(i,idx){s[idx]={deliveryStatus:i.deliveryStatus,link:i.link};});try{localStorage.setItem('inmarket_state',JSON.stringify(s));}catch(e){}}
function loadLocalState(cb){try{var r=localStorage.getItem('inmarket_state');if(r){var ls=JSON.parse(r);Object.keys(ls).forEach(function(idx){var i=initiatives[parseInt(idx)];if(!i)return;i.deliveryStatus=ls[idx].deliveryStatus||i.deliveryStatus;i.link=ls[idx].link||i.link;});}}catch(e){}if(cb)cb();}
function roiCalcGroup(items){var a=0,rs=0,rc=0;items.forEach(function(i){var av=parseFloat(String(i.addedValue||'').replace(/[^0-9.-]/g,''));if(!isNaN(av))a+=av;var r=parseFloat(String(i.roi||'').replace(/[^0-9.-]/g,''));if(!isNaN(r)){rs+=r;rc++;}});return{count:items.length,av:a,roiAvg:rc?rs/rc:NaN};}
function roiFmtAV(n){if(!n&&n!==0)return '\u2014';if(n>=1000000)return '$'+(n/1000000).toFixed(2)+'M';if(n>=1000)return '$'+(n/1000).toFixed(2)+'K';return '$'+n.toFixed(2);}
function roiFmtEU(n){if(!n&&n!==0)return '\u2014';return '$'+n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function buildQFilter(prefix,fn){var cq=currentQ();return '<div class="qfilter">'+['Q1','Q2','Q3','Q4','all'].map(function(q){var lbl=q==='all'?'All Year':q,act=q===cq;return '<button id="'+prefix+'-btn-'+q+'" class="qfilter-btn'+(act?' act':'')+'" data-qfn="'+fn+'" data-q="'+q+'">'+lbl+'</button>';}).join('')+'</div>';}
function setQAct(prefix,q){['Q1','Q2','Q3','Q4','all'].forEach(function(b){var el=document.getElementById(prefix+'-btn-'+b);if(el){if(b===q)el.classList.add('act');else el.classList.remove('act');}});}
function scInitiativesFor(subset,label){var ns=subset.filter(function(i){return i.deliveryStatus==='not-started';}).length,on=subset.filter(function(i){return i.deliveryStatus==='on-track';}).length,ar=subset.filter(function(i){return i.deliveryStatus==='at-risk';}).length,dl=subset.filter(function(i){return i.deliveryStatus==='delayed';}).length;return '<div class="mcard" id="sc-init"><div class="mlabel">Initiatives <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint)">'+label+'</span></div><div class="mval">'+subset.length+'</div><div class="sc-badges"><span class="sc-badge ds-gray">'+ns+' Not Started</span><span class="sc-badge ds-green">'+on+' On Track</span><span class="sc-badge ds-yellow">'+ar+' At Risk</span><span class="sc-badge ds-red">'+dl+' Delayed</span></div></div>';}

function buildQuarterlyProgressBars(){var quarters=['Q1','Q2','Q3','Q4','Backlog'];return '<div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px">'+quarters.map(function(q){var items=initiatives.filter(function(i){return i.quarter===q;}),total=items.length||1;var ns=items.filter(function(i){return i.deliveryStatus==='not-started';}).length,on=items.filter(function(i){return i.deliveryStatus==='on-track';}).length,ar=items.filter(function(i){return i.deliveryStatus==='at-risk';}).length,dl=items.filter(function(i){return i.deliveryStatus==='delayed';}).length;var avSum=0;items.forEach(function(i){var n=parseFloat(String(i.addedValue||'').replace(/[^0-9.-]/g,''));if(!isNaN(n))avSum+=n;});var avLbl=avSum>=1000000?'$'+(avSum/1000000).toFixed(1)+'M':avSum>=1000?'$'+(avSum/1000).toFixed(0)+'K':avSum>0?'$'+avSum.toFixed(0):'\u2014';var nsW=Math.round(ns/total*100),onW=Math.round(on/total*100),arW=Math.round(ar/total*100),dlW=Math.round(dl/total*100);var meta=(ns>0?ns+' not started \u00b7 ':'')+(on>0?on+' on track \u00b7 ':'')+(ar>0?ar+' at risk \u00b7 ':'')+(dl>0?dl+' delayed':'');if(items.length===0)meta='No initiatives';var roiSum=0,roiCount=0;items.forEach(function(i){var r=parseFloat(String(i.roi||'').replace(/[^0-9.-]/g,''));if(!isNaN(r)){roiSum+=r;roiCount++;}});var roiPct=roiCount?Math.round(roiSum/roiCount*100)+'%':'\u2014';return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden"><div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:500">'+q+'</span><span style="font-size:11px;color:var(--faint);background:var(--bg);border-radius:20px;padding:1px 8px">'+items.length+'</span></div><div style="padding:10px 14px 4px"><div style="display:flex;height:6px;border-radius:4px;overflow:hidden;gap:1px">'+(nsW>0?'<div style="flex:'+nsW+';background:#6B6B65"></div function buildScatterPlot(q){var subset=q==='all'?initiatives.filter(function(i){return i.quarter!=='Backlog';}):initiatives.filter(function(i){return i.quarter===q;});var driverColors={'Revenue Generating':'#66C220','Operational Efficiency':'#854F0B','Enhancements':'#888780','Strategic':'#185FA5','Tech':'#0D1E36'};var drivers=[];subset.forEach(function(i){if(drivers.indexOf(i.driver)===-1)drivers.push(i.driver);});drivers.sort();return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:12px">Added Value vs ROI \u2014 each point is an initiative</div><div style="position:relative;width:100%;height:240px"><canvas id="roiScatterCanvas"></canvas></div><div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px">'+drivers.map(function(d){var c=driverColors[d]||'#888780';return '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><span style="width:8px;height:8px;border-radius:50%;background:'+c+';display:inline-block"></span>'+d+'</span>';}).join('')+'</div></div>';}
function renderScatterChart(q){var subset=q==='all'?initiatives.filter(function(i){return i.quarter!=='Backlog';}):initiatives.filter(function(i){return i.quarter===q;});var driverColors={'Revenue Generating':'#66C220','Operational Efficiency':'#854F0B','Enhancements':'#888780','Strategic':'#185FA5','Tech':'#0D1E36'};var drivers=[];subset.forEach(function(i){if(drivers.indexOf(i.driver)===-1)drivers.push(i.driver);});drivers.sort();var datasets=drivers.map(function(d){var color=driverColors[d]||'#888780';var pts=subset.filter(function(i){return i.driver===d;}).map(function(i){var av=parseFloat(String(i.addedValue||'').replace(/[^0-9.-]/g,'')),roi=parseFloat(String(i.roi||'').replace(/[^0-9.-]/g,''));if(isNaN(av)||isNaN(roi))return null;return{x:av,y:Math.round(roi*100),label:i.title};}).filter(Boolean);return{label:d,data:pts,backgroundColor:color+'99',borderColor:color,pointRadius:7,pointHoverRadius:10};});var canvas=document.getElementById('roiScatterCanvas');if(!canvas||!window.Chart)return;if(window._roiChart)window._roiChart.destroy();window._roiChart=new Chart(canvas,{type:'scatter',data:{datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw.label+' \u2014 $'+c.raw.x+'K, '+c.raw.y+'%';}}}},scales:{x:{title:{display:true,text:'Added Value ($K)',font:{size:11}},ticks:{font:{size:11},callback:function(v){return '$'+v+'K';}}},y:{title:{display:true,text:'ROI %',font:{size:11}},ticks:{font:{size:11},callback:function(v){return v+'%';}}}},layout:{padding:10}}});}

function roiMakeBarCard(subset,title,label,key){var keys=[];subset.forEach(function(i){if(keys.indexOf(i[key])===-1)keys.push(i[key]);});keys.sort();var rows=keys.map(function(k,ki){var s=roiCalcGroup(subset.filter(function(i){return i[key]===k;})),p=isNaN(s.roiAvg)?0:Math.round(s.roiAvg*100),tc=p<0?'#E24B4A':'#3B6D11',isLast=ki===keys.length-1;return '<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:10px 0;'+(isLast?'':' border-bottom:0.5px solid var(--border);')+'align-items:center"><div style="font-size:12px;color:var(--text)">'+k+'</div><div style="font-size:12px;font-weight:500;text-align:right;min-width:80px">'+roiFmtEU(s.av)+'</div><div style="font-size:12px;font-weight:500;color:'+tc+';text-align:right;min-width:48px">'+p+'%</div></div>';}).join('');var hdr='<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)"><div></div><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);text-align:right;min-width:80px">Added Value</div><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);text-align:right;min-width:48px">Avg ROI</div></div>';return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:14px">'+title+' &mdash; '+label+'</div>'+hdr+rows+'</div>';}

    + '<div class="wip-box"><div class="wip-eyebrow">\ud83d\udea7 Under construction</div><div class="wip-heading">Testing ground</div><div class="wip-body">This space is for testing new functionality before it goes live. Things here may change, break, or disappear entirely. No promises.</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:12px">'+sigBoxes+'</div>';
}

function renderResources() {
  if (_wizState['patterns'] === undefined) _wizState['patterns'] = 0;
  return '<div class="ptitle">Recognize the Patterns</div><div class="psub">Recurring dynamics worth naming \u2014 because you can\u2019t fix what you can\u2019t see</div>'
    + wizHtml('patterns', _wizItemsPatterns);
}

function renderBoilingFrog() {
  if (_wizState['frog'] === undefined) _wizState['frog'] = 0;

    + '<div class="psub">On how organizations learn to tolerate what they should never have accepted</div>'

    + '</div>'

var PAGES = {roadmap:renderRoadmap, wip:renderWIP, resources:renderResources, boilingfrog:renderBoilingFrog};

function buildNav() {
  document.getElementById('nav').innerHTML = NAV_CONFIG.map(function(sec) {
    return '<div><div class="seclabel">'+sec.section+'</div>'
      + sec.items.map(function(item) {
          var act = item.id === activeId;
          return '<div class="nitem'+(act?' act':'')+'" data-page="'+item.id+'" data-label="'+item.label+'">'
            + (act?'<div class="nbar"></div>':'')
            + '<div class="nico">'+item.icon+'</div>'
            + '<span class="nlabel">'+item.label+'</span>'
            + '</div>';
        }).join('') + '</div>';
  }).join('');
}

function setPage(id, label) {
  activeId = id;
  document.getElementById('pgname').textContent = label;
  var content = document.getElementById('content');
  if (PAGES[id]) {
    content.innerHTML = PAGES[id]();
  } else if (id.startsWith('ref_')) {
    var rid = id.slice(4);
    var ref = REFERENCES.filter(function(r){return r.id===rid;})[0];
    content.innerHTML = ref
      ? '<div class="ptitle">'+ref.fullName+'</div><div class="psub" style="margin-bottom:24px">'+ref.title+'</div>'+renderRef(ref)
      : '<div class="ptitle">'+label+'</div>';
  } else {
    content.innerHTML = '<div class="ptitle">'+label+'</div>';
  }
  buildNav();
}

function loadData(cb) {
  var el = document.getElementById('content');
  if (el) el.innerHTML = '<div style="padding:40px 32px;font-size:13px;color:var(--muted)">Loading data...</div>';
  fetch('/api/data')
    .then(function(r){return r.json();})
    .then(function(data){
      initiatives = (data.initiatives||[]).map(function(i){
        return {quarter:String(i.quarter||'').trim(),title:String(i.title||'').trim(),driver:String(i.driver||'').trim(),team:String(i.team||'').trim(),theme:String(i.theme||'').trim(),productOwner:String(i.productOwner||'').trim(),techLead:String(i.techLead||'').trim(),addedValue:(i.addedValue!==undefined&&i.addedValue!=='')?i.addedValue:'\u2014',roi:(i.roi!==undefined&&i.roi!=='')?i.roi:'\u2014',deliveryStatus:'not-started',confidence:'medium',link:''};
      });
      loadLocalState(function(){if(cb)cb();});
    })
    .catch(function(err){if(el)el.innerHTML='<div style="padding:40px 32px;font-size:13px;color:#C0392B">Failed to load data.<br><br>'+err+'</div>';});
}

document.addEventListener('click', function(e) {
  var ni = e.target.closest('[data-page]');
  if (ni) { setPage(ni.dataset.page, ni.dataset.label); return; }

  var ti = e.target.closest('[data-tab]');
  if (ti) { var id=ti.dataset.tab; document.querySelectorAll('.tabnav .tabitem').forEach(function(b){b.classList.remove('act');}); ti.classList.add('act'); document.querySelectorAll('.tabpanel').forEach(function(p){p.classList.remove('act');}); var tp=document.getElementById('rt-'+id); if(tp)tp.classList.add('act'); if(id==='roi')setTimeout(function(){renderScatterChart(currentQ());},50); return; }

  var qb = e.target.closest('[data-qfn]');
  if (qb) { var fn=qb.dataset.qfn,q=qb.dataset.q; if(fn==='switchTableQuarter')switchTableQuarter(q); else if(fn==='switchKanbanQuarter')switchKanbanQuarter(q); else if(fn==='switchROIQuarter')switchROIQuarter(q); return; }

  var dw = e.target.closest('.ds-wrap[data-idx]');
  if (dw) { e.stopPropagation(); var idx=parseInt(dw.dataset.idx); document.querySelectorAll('.status-menu').forEach(function(m){m.remove();}); var menu=document.createElement('div'); menu.className='status-menu'; menu.style.cssText='position:fixed;z-index:999;background:var(--surface);border:1px solid var(--border-md);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);padding:4px;min-width:130px;'; deliveryOpts.forEach(function(o){var item=document.createElement('div'); item.style.cssText='padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;'; item.innerHTML='<span class="pill '+o.cls+'" style="pointer-events:none">'+o.label+'</span>'; item.onmouseenter=function(){item.style.background='var(--bg)';}; item.onmouseleave=function(){item.style.background='';}; item.onclick=function(ev){ev.stopPropagation();updateStatus(idx,o.val);menu.remove();}; menu.appendChild(item);}); var r=dw.getBoundingClientRect(); menu.style.top=(r.bottom+4)+'px'; menu.style.left=r.left+'px'; document.body.appendChild(menu); setTimeout(function(){document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h);});},0); return; }

  var lb = e.target.closest('[data-link-idx]');
  if (lb) { e.stopPropagation(); var idx2=parseInt(lb.dataset.linkIdx); _linkIdx=idx2; var pop=document.getElementById('linkPopup'); document.getElementById('linkInput').value=initiatives[idx2].link||''; document.getElementById('linkOpenBtn').disabled=!initiatives[idx2].link; var r2=lb.getBoundingClientRect(); pop.style.top=(r2.bottom+6)+'px'; pop.style.left=Math.min(r2.left,window.innerWidth-316)+'px'; pop.classList.add('show'); setTimeout(function(){document.getElementById('linkInput').focus();},50); return; }

  var fr = e.target.closest('[data-reset]');
  if (fr) { resetFilters(); return; }

  var sq = e.target.closest('[data-sq]');
  if (sq) { sigRequest(sq.dataset.sq, decodeURIComponent(sq.dataset.sl), sq.dataset.se); return; }

  var sr = e.target.closest('[data-sr]');
  if (sr) { sigRequest(sr.dataset.sr, decodeURIComponent(sr.dataset.sl), sr.dataset.se); return; }

  var sv = e.target.closest('[data-sv]');
  if (sv) { sigVerify(sv.dataset.sv, decodeURIComponent(sv.dataset.sl), sv.dataset.se); return; }

  var wd = e.target.closest('[data-wiz]');
  if (wd) {
    var wizId = wd.dataset.wiz;
    var dir   = parseInt(wd.dataset.wizDir);
    var cur   = _wizState[wizId] !== undefined ? _wizState[wizId] : 0;
    var items = wizId === 'frog' ? _wizItemsFrog : _wizItemsPatterns;
    wizSetIndex(wizId, cur + dir, items);
    return;
  }

  var wt = e.target.closest('[data-wiz-toggle]');
  if (wt) {
    var wtId  = wt.dataset.wizToggle;
    var wtIdx = parseInt(wt.dataset.wizIdx);
    var wtItems = wtId === 'frog' ? _wizItemsFrog : _wizItemsPatterns;
    wizSetIndex(wtId, wtIdx, wtItems);
    return;
  }

  var pop2 = document.getElementById('linkPopup');
  if (pop2.classList.contains('show') && !pop2.contains(e.target)) closePopup();
});

document.addEventListener('change', function(e) {
  var ss = e.target.closest('[data-status-idx]');
  if (ss) { updateStatus(parseInt(ss.dataset.statusIdx), ss.value); return; }
  var ff = e.target.closest('[data-filter]');
  if (ff) { applyFilters(); return; }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var inp = e.target.closest('.sig-code-input');
    if (inp) { var pid = inp.id.replace('sig-inp-',''); var sv2 = document.querySelector('[data-sv="'+pid+'"]'); if(sv2) sv2.click(); }
  }
  if (e.key === 'Escape') closePopup();
});
