<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InMarket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="amark"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 4.5L8.5 6L5.5 9L8.5 12L7 13.5L3 9Z" fill="white"/><path d="M9 9L13 4.5L14.5 6L11.5 9L14.5 12L13 13.5L9 9Z" fill="white" opacity=".45"/></svg></div>
      <span style="font-size:18px;font-weight:500;letter-spacing:-.3px">InMarket</span>
    </div>
    <div class="atitle">Sign in</div>
    <div class="asub">Enter your credentials to continue</div>
    <div class="fwrap"><div class="flabel">Email</div><input class="finput" id="em" type="text" value="condoadmin@inmarket.ai" placeholder="you@company.com"/></div>
    <div class="fwrap"><div class="flabel">Password</div><input class="finput" id="pw" type="password" placeholder="••••••••"/></div>
    <div class="aerr" id="err"></div>
    <button class="abtn" id="loginBtn">Sign in</button>
    <div class="ahint" style="background:#F4FCF0;border:1px solid rgba(102,194,32,.25);border-radius:8px;padding:10px 14px;margin-top:14px;text-align:left;color:var(--muted);font-size:11px;line-height:1.6">
      <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:5px">Demo credentials</div>
      <div><strong style="color:var(--text)">Email:</strong> condoadmin@inmarket.ai</div>
      <div><strong style="color:var(--text)">Password:</strong> HelixCapital</div>
    </div>
  </div>
</div>
<div id="app">
  <div class="sbwrap">
    <div class="sb" id="sb">
      <div class="sbhead">
        <div class="lmark" style="background:none;overflow:hidden"><svg width="26" height="26" viewBox="0 0 26 26" fill="none">
<rect x="0" y="15" width="26" height="11" rx="2" fill="#66C220" opacity=".25"/>
<path d="M0 16 Q3.5 13.5 7 16 Q10.5 18.5 14 16 Q17.5 13.5 21 16 Q24.5 18.5 26 16.5 V26 H0 Z" fill="#B8D4F0" opacity=".45"/>
<path d="M0 18 Q4 15.5 8 18 Q12 20.5 16 18 Q20 15.5 24 18 Q25.5 19 26 18.5 V26 H0 Z" fill="#89B5DA" opacity=".4"/>
<ellipse cx="13" cy="16" rx="6" ry="4" fill="#9DC47A" opacity=".9"/>
<ellipse cx="13" cy="15" rx="5" ry="3.2" fill="#8BAF6A"/>
<circle cx="10" cy="12" r="2.8" fill="#6B8A50"/>
<circle cx="16" cy="12" r="2.8" fill="#6B8A50"/>
<circle cx="10" cy="12" r="1.7" fill="#fff" opacity=".9"/>
<circle cx="16" cy="12" r="1.7" fill="#fff" opacity=".9"/>
<circle cx="10.4" cy="12.2" r=".9" fill="#2A3A1A"/>
<circle cx="16.4" cy="12.2" r=".9" fill="#2A3A1A"/>
<path d="M20 10 Q21 7 22 8 Q23 9 22 11" stroke="#8BAF6A" stroke-width="1.2" stroke-linecap="round" fill="none"/>
<path d="M22 8 L23 6.5 M22 8.5 L24 7.5 M22 9.5 L24 9" stroke="#8BAF6A" stroke-width=".8" stroke-linecap="round"/>
<circle cx="7" cy="20" r="1.2" fill="none" stroke="#fff" stroke-width=".6" opacity=".6"/>
<circle cx="5" cy="18" r=".8" fill="none" stroke="#fff" stroke-width=".5" opacity=".5"/>
<circle cx="19" cy="21" r="1" fill="none" stroke="#fff" stroke-width=".6" opacity=".5"/>
</svg></div>
        <span class="lname">InMarket</span>
      </div>
      <nav class="sbnav" id="nav"></nav>
      <div class="sbfoot">
        <div class="avatar" id="av"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><ellipse cx="10" cy="13" rx="7" ry="5" fill="#9DC47A" opacity=".85"/><ellipse cx="10" cy="12" rx="5.5" ry="3.8" fill="#8BAF6A" opacity=".9"/><circle cx="7.5" cy="8.5" r="2.2" fill="#6B8A50"/><circle cx="12.5" cy="8.5" r="2.2" fill="#6B8A50"/><circle cx="7.5" cy="8.5" r="1.4" fill="#fff" opacity=".9"/><circle cx="12.5" cy="8.5" r="1.4" fill="#fff" opacity=".9"/><circle cx="7.9" cy="8.5" r=".7" fill="#2A3A1A"/><circle cx="12.9" cy="8.5" r=".7" fill="#2A3A1A"/><path d="M8.5 12 Q10 13.5 11.5 12" stroke="#5A7A40" stroke-width=".8" fill="none" stroke-linecap="round"/></svg></div>
        <div class="uinfo"><div class="uname" id="un">Admin</div><div class="urole">Head of Product</div></div>
        <div class="logoutbtn" id="logoutBtn" title="Sign out"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div>
    <div class="togbtn" id="tog"><svg id="togico" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6 2L3 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="breadcrumb">Product &nbsp;/&nbsp; <b id="pgname">Product Roadmap</b></span>
      <button class="ob-replay-btn" id="obReplayBtn" title="Replay the guided tour"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 5.5A6 6 0 1 0 14 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 2v4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Tour</button>
      <span class="tbadge" id="qbadge"></span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="link-popup" id="linkPopup">
  <div class="link-popup-title">Initiative link</div>
  <div class="link-popup-row">
    <input type="url" id="linkInput" placeholder="https://..."/>
    <button class="link-popup-open" id="linkOpenBtn" title="Open link"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 2h5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    <button class="link-popup-save" id="linkSaveBtn">Save</button>
    <button class="link-popup-clear" id="linkClearBtn">X</button>
  </div>
</div>
<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- App modules (order matters: dependencies first) -->
<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/loader.js"></script>
<script src="js/signatures.js"></script>
<script src="js/resources.js"></script>
<script src="js/roadmap.js"></script>
<script src="js/references.js"></script>
<script src="js/wip.js"></script>
<script src="js/capacity.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/app.js"></script>
</body>
</html>
